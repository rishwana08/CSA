<!DOCTYPE html>
<html>
<head>
    <title>Campus Connect</title>
</head>
<body>

    <h1>Campus Connect</h1>
    <h3>Buyer / Seller Registration</h3>

    <form id="registerForm">
        <label>Name:</label><br>
        <input type="text" id="name" required><br><br>

        <label>College Email:</label><br>
        <input type="email" id="email" required><br><br>

        <label>Role:</label><br>
        <select id="role" onchange="toggleCategory()" required>
            <option value="">Select Role</option>
            <option value="buyer">Buyer</option>
            <option value="seller">Seller</option>
        </select><br><br>

        <div id="sellerSection" style="display:none;">
            <label>Select Category:</label><br>

            <input type="checkbox" value="Web Development"> Web Development<br>
            <input type="checkbox" value="Graphic Design"> Graphic Design<br>
            <input type="checkbox" value="Video Editing"> Video Editing<br>
            <input type="checkbox" value="Photography"> Photography<br>
            <input type="checkbox" value="Tutoring"> Tutoring<br>
            <input type="checkbox" value="Content Writing"> Content Writing<br><br>

            <label>WhatsApp Number:</label><br>
            <input type="text" id="whatsapp" placeholder="91XXXXXXXXXX"><br><br>
        </div>

        <button type="submit">Register</button>
    </form>

    <hr>

    <h2>Registered Seller Profile</h2>

    <div id="profile"></div>

    <script>
        function toggleCategory() {
            var role = document.getElementById("role").value;
            var sellerSection = document.getElementById("sellerSection");

            if (role === "seller") {
                sellerSection.style.display = "block";
            } else {
                sellerSection.style.display = "none";
            }
        }

        document.getElementById("registerForm").addEventListener("submit", function(e) {
            e.preventDefault();

            var name = document.getElementById("name").value;
            var email = document.getElementById("email").value;
            var role = document.getElementById("role").value;

            if (!email.endsWith("@vetias.ac.in")) {
                alert("Please use your college email ID.");
                return;
            }

            if (role === "") {
                alert("Please select a role.");
                return;
            }

            if (role === "buyer") {
                alert("Buyer Registration Successful!");
                return;
            }

            var categories = [];
            var checkboxes = document.querySelectorAll(
                '#sellerSection input[type="checkbox"]:checked'
            );

            checkboxes.forEach(function(box) {
                categories.push(box.value);
            });

            var whatsapp = document.getElementById("whatsapp").value;

            document.getElementById("profile").innerHTML =
                "<h3>" + name + "</h3>" +
                "<p><strong>Email:</strong> " + email + "</p>" +
                "<p><strong>Role:</strong> Seller</p>" +
                "<p><strong>Categories:</strong> " + categories.join(", ") + "</p>" +
                '<a href="https://wa.me/' + whatsapp +
                '" target="_blank">Contact via WhatsApp</a>';

            alert("Seller Registration Successful!");
        });
    </script>

</body>
</html>
